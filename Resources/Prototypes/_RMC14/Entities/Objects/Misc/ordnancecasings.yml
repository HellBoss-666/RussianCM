- type: entity
  abstract: true
  parent: BaseItem
  id: RMCCasingBase
  name: base casing
  description: An empty casing.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/CustomOrdnance/m40grenadecasing.rsi
    state: icon
  - type: Item
    size: Small
  - type: PayloadCase
  - type: ExplosionResistance
    damageCoefficient: 0
  - type: Destructible
    thresholds: []

# ──────────────────────────────────────────────────────────────────────────────
# Grenade casings
# ──────────────────────────────────────────────────────────────────────────────

- type: entity
  name: 30mm grenade casing (M40)
  description: An empty M40 grenade casing. Fill with a detonator assembly and chemicals, then prime.
  parent: RMCCasingBase
  id: RMCM40GrenadeCasing
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/CustomOrdnance/m40grenadecasing.rsi
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 4250
  - type: RMCChembombCasing
    maxVolume: 120
    basePower: 180
    baseFalloff: 80
    baseShards: 40
    minFireIntensity: 3
    maxFireIntensity: 25
    minFireRadius: 1
    maxFireRadius: 5
    minFireDuration: 3
    maxFireDuration: 24
  - type: SolutionContainerManager
    solutions:
      chemicals:
        maxVol: 120
  - type: ItemSlots
    slots:
      detonator:
        name: rmc-chembomb-detonator-slot
        whitelist:
          components:
          - RMCDetonatorAssembly
  - type: Tag
    tags:
    - RMCGrenadeM40
    - LauncherCompatibleGrenade

