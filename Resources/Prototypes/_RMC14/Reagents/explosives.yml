# Synthesis reactions
- type: reaction
  id: RMCAmmoniumNitrateReaction
  reactants:
    Ammonia:
      amount: 1
    RMCPolytrinicAcid:
      amount: 1
  products:
    RMCAmmoniumNitrate: 1
    Water: 1

- type: reaction
  id: RMCANFOReaction
  reactants:
    RMCAmmoniumNitrate:
      amount: 3
    WeldingFuel:
      amount: 1
  products:
    RMCANFO: 4

- type: reaction
  id: RMCPotassiumHydroxideReaction
  reactants:
    RMCPotassium:
      amount: 1
    Water:
      amount: 1
  products:
    RMCPotassiumHydroxide: 1
    RMCHydrogen: 1

# Азотная кислота: нитрогенизация через нагрев (N2 + 2O2 + H2O → 2HNO3)
- type: reaction
  id: RMCNitricAcidReaction
  reactants:
    RMCNitrogen:
      amount: 1
    RMCOxygen:
      amount: 2
    Water:
      amount: 1
  products:
    RMCNitricAcid: 2
  minTemp: 450

# Гексамин: конденсация формальдегида с аммиаком (6CH2O + 4NH3 → C6H12N4 + 6H2O)
- type: reaction
  id: RMCHexamineReaction
  reactants:
    Formaldehyde:
      amount: 6
    Ammonia:
      amount: 4
  products:
    RMCHexamine: 4
    Water: 2

# Циклонит: нитрование гексамина (требует охлаждения!)
- type: reaction
  id: RMCCycloniteReaction
  reactants:
    RMCHexamine:
      amount: 3
    RMCPolytrinicAcid:
      amount: 6
  products:
    RMCCyclonite: 3
    Water: 3
    Ammonia: 3
  maxTemp: 280

# Октоген: синтез из циклонита и нитрата аммония (требует охлаждения!)
- type: reaction
  id: RMCOctogenReaction
  reactants:
    RMCCyclonite:
      amount: 3
    RMCAmmoniumNitrate:
      amount: 1
  products:
    RMCOctogen: 4
  maxTemp: 280

# Нитроглицерин: нитрование глицерола (требует охлаждения!)
- type: reaction
  id: RMCNitroglycerinReaction
  reactants:
    RMCGlycerol:
      amount: 1
    RMCNitricAcid:
      amount: 3
    SulfuricAcid:
      amount: 1
  products:
    RMCNitroglycerin: 3
    Water: 1
  maxTemp: 280

# Хлорид калия: реакция калия с хлором
- type: reaction
  id: RMCPotassiumChlorideReaction
  reactants:
    RMCPotassium:
      amount: 1
    RMCChlorine:
      amount: 1
  products:
    RMCPotassiumChloride: 1

# Хлорид натрия: реакция натрия с хлором
- type: reaction
  id: RMCSodiumChlorideReaction
  reactants:
    RMCSodium:
      amount: 1
    RMCChlorine:
      amount: 1
  products:
    RMCSodiumChloride: 1


# Polytrinic acid
- type: reagent
  id: RMCPolytrinicAcid
  name: reagent-name-polytrinic-acid
  group: Toxins
  desc: reagent-desc-polytrinic-acid
  physicalDesc: reagent-physical-desc-strong-smelling
  flavor: acid
  color: "#8E18A9"
  boilingPoint: 78.2 # This isn't a real chemical...
  meltingPoint: -19.4
  plantMetabolism:
  - !type:PlantAdjustToxins
    amount: 20
  - !type:PlantAdjustWeeds
    amount: -4
  - !type:PlantAdjustHealth
    amount: -8
  reactiveEffects:
    Acidic:
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        scaleByQuantity: true
        ignoreResistances: false
        damage:
          types:
            Caustic: 0.5
      - !type:Emote
        emote: Scream
        probability: 0.3
  metabolisms:
    Poison:
      metabolismRate : 3.00 # High damage, high metabolism rate. You need a lot of units to crit. Simulates acid burning through you fast.
      effects:
      - !type:HealthChange
        damage:
          types:
            Caustic: 11.0
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages: [ "generic-reagent-effect-burning-insides" ]
        probability: 0.33
      - !type:Emote
        emote: Scream
        probability: 0.3

- type: reaction
  id: RMCPolytrinicAcid
  reactants:
    SulfuricAcid:
      amount: 1
    Chlorine:
      amount: 1
    Potassium:
      amount: 1
  products:
    PolytrinicAcid: 3

