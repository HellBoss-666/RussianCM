# Detonator assemblies for Ordnance Technician chembomb crafting.
# Insert one of these into a chembomb casing to give it a trigger mechanism.
# Based on CMSS13 Ordnance Technician detonation assembly mechanics.
#
# ASSEMBLY PARTS (printed from armylathe, then combined):
#   RMCOrdnanceIgniter + RMCOrdnanceTimer   → RMCTimerDetonatorAssembly
#   RMCOrdnanceIgniter + RMCOrdnanceIgniter → RMCDoubleIgniterAssembly  (rockets)
#   RMCOrdnanceTimer   + RMCOrdnanceTimer   → RMCTimerDetonatorAssembly

# ──────────────────────────────────────────────────────────────────────────────
# Assembly parts — combine to produce a complete detonator assembly
# ──────────────────────────────────────────────────────────────────────────────

- type: entity
  parent: BaseItem
  id: RMCOrdnanceIgniter
  name: ordnance igniter
  description: A small electrical igniter. Combine with a timer to produce a timer assembly, or combine two igniters for a double-igniter assembly (required for rockets).
  components:
  - type: Sprite
    sprite: Objects/Devices/igniter.rsi
    state: timer
  - type: Item
    size: Tiny
  - type: RMCOrdnancePart
    partType: Igniter

- type: entity
  parent: BaseItem
  id: RMCOrdnanceTimer
  name: ordnance timer
  description: A configurable countdown timer. Combine with an igniter to produce a timer assembly.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/timer.rsi
    state: timer
  - type: Item
    size: Small
  - type: RMCOrdnancePart
    partType: Timer

# ──────────────────────────────────────────────────────────────────────────────
# Complete assemblies (result of combining parts)
# ──────────────────────────────────────────────────────────────────────────────

- type: entity
  abstract: true
  parent: BaseItem
  id: RMCDetonatorAssemblyBase
  name: detonator assembly
  description: A detonator assembly for use in custom ordnance.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/timer.rsi
    state: timer
  - type: Item
    size: Small
  - type: RMCDetonatorAssembly

# ──────────────────────────────────────────────────────────────────────────────
# Timer assembly — user activates the casing to start a countdown.
# ──────────────────────────────────────────────────────────────────────────────

- type: entity
  parent: RMCDetonatorAssemblyBase
  id: RMCTimerDetonatorAssembly
  name: timer detonator assembly
  description: Insert into a casing, then use the casing in-hand to start the countdown.
  components:
  - type: RMCDetonatorAssembly
    detonatorType: Timer
  - type: Tag
    tags:
    - RMCTimerAssembly
  - type: PayloadTrigger
    components:
    - type: OnUseTimerTrigger
      delay: 5
      delayOptions: [3, 5, 10, 30]
      initialBeepDelay: 0
      beepInterval: 5
      beepSound:
        path: /Audio/_RMC14/Explosion/armbomb.ogg
        params:
          volume: -5
      doPopup: true

# ──────────────────────────────────────────────────────────────────────────────
# Double igniter assembly — near-instant detonation on use.
# ──────────────────────────────────────────────────────────────────────────────

- type: entity
  parent: RMCDetonatorAssemblyBase
  id: RMCDoubleIgniterAssembly
  name: double igniter assembly
  description: Use the casing in-hand to detonate immediately after a 1-second safety delay. Required for rocket warheads.
  components:
  - type: RMCDetonatorAssembly
    detonatorType: DoubleIgniter
  - type: Tag
    tags:
    - RMCDoubleIgniterAssembly
  - type: PayloadTrigger
    components:
    - type: OnUseTimerTrigger
      delay: 1
      initialBeepDelay: 0
      beepInterval: 99999
      doPopup: false

# ──────────────────────────────────────────────────────────────────────────────
# Proximity sensor assembly — step-triggered timer detonation.
# ──────────────────────────────────────────────────────────────────────────────

- type: entity
  parent: RMCDetonatorAssemblyBase
  id: RMCProximitySensorAssembly
  name: proximity sensor assembly
  description: Insert into a mine casing, then plant the mine on the floor. Detonates when stepped on.
  components:
  - type: RMCDetonatorAssembly
    detonatorType: Proximity
  - type: Tag
    tags:
    - RMCProximityAssembly

# ──────────────────────────────────────────────────────────────────────────────
# Remote signaler assembly — triggered by a matching-frequency signaler.
# ──────────────────────────────────────────────────────────────────────────────

- type: entity
  parent: RMCDetonatorAssemblyBase
  id: RMCSignalerAssembly
  name: remote signaler assembly
  description: Pair it with a handheld signaler on the same frequency to detonate remotely.
  components:
  - type: RMCDetonatorAssembly
    detonatorType: Signaler
  - type: Tag
    tags:
    - RMCSignalerAssembly
  - type: PayloadTrigger
    components:
    - type: OnUseTimerTrigger
      delay: 3
      initialBeepDelay: 0
      beepInterval: 99999
      doPopup: false

- type: Tag
  id: RMCSignalerAssembly
- type: Tag
  id: RMCTimerAssembly


