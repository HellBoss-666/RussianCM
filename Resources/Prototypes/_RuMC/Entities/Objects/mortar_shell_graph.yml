#### Что я хочу видеть
# Боеголовка
# 1. Боеголовка
# 2. В боеголовку вставляется заряд
# 3. К боеголовке присоединяется пороховой заряд
# Заряд - начнем с этого
# 1. Просто заряд
# 2. В заряд заливается что-нибудь
# 3. Заряд закручивается = готовый заряд.

- type: constructionGraph
  id: RMC80mmMortarCasingCustomGraph
  start: start
  graph:
  # стартовая нода
  - node: start
    edges:
    - to: emptyCasing
      steps:
      - material: CMSteel
        amount: 5
        doAfter: 1
  # пустой кейсинг
  - node: emptyCasing
    edges:
    # Разбор обратно в сталь
    - to: start
      completed:
      - !type:SpawnPrototype
        prototype: CMSheetMetal
      - !type:DeleteEntity
      steps:
      - tool: Welding
        doAfter: 2
    # Закрыть крышку, сделав эту хуйню готовой
    - to: ready
      steps:
      - tool: Screwing
      doAfter: 1
  # готовый заряд для мины
  - node: ready
    edges:
    # открутить обратно крышку
    - to: emptyCasing
      steps:
      - tool: Screwing
        doAfter: 1






