- type: entity
  noSpawn: false
  parent: MobHuman
  id: TDMUrbanPreset
  name: UrbanPreset
  suffix: TDM
  components:
    - type: AutoImplant
      implants:
      - DeathAcidifierImplanter
    - type: RandomMetadata
      nameSegments:
      - NamesFirstMilitary
      - names_last
    - type: Sprite
      netsync: false
      sprite: Markers/jobs.rsi
      state: ertleadereva
    - type: Loadout
      prototypes: [ TDMUrbanGear ]
    - type: RandomHumanoidAppearance
      randomizeName: false
